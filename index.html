<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Save2Play</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" class="logo-svg">
        <defs>
          <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <filter id="magenta-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <g transform="translate(5, 5)">
          <g transform="translate(0, 2)">
            <rect x="2" y="2" width="36" height="36" rx="8" fill="#0B0E14" stroke="#00F0FF" stroke-width="1.5" filter="url(#cyan-glow)"/>
            <rect x="17" y="9" width="6" height="22" rx="1.5" fill="#151A24" stroke="rgba(0, 240, 255, 0.4)" stroke-width="1"/>
            <rect x="9" y="17" width="22" height="6" rx="1.5" fill="#151A24" stroke="rgba(0, 240, 255, 0.4)" stroke-width="1"/>
            <circle cx="20" cy="20" r="2.5" fill="#00F0FF"/>
            <circle cx="29" cy="13" r="2" fill="#FF007F" filter="url(#magenta-glow)"/>
            <circle cx="29" cy="27" r="2" fill="#FF007F" filter="url(#magenta-glow)"/>
          </g>
          <text x="52" y="28" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#00F0FF" letter-spacing="1" filter="url(#cyan-glow)">SAVE</text>
          <rect x="111" y="10" width="16" height="22" rx="4" fill="#151A24" stroke="#FF007F" stroke-width="1.5" filter="url(#magenta-glow)"/>
          <text x="115" y="27" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="900" fill="#ffffff">2</text>
          <text x="135" y="28" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#FF007F" letter-spacing="1" filter="url(#magenta-glow)">PLAY</text>
        </g>
      </svg>
    </div>

    <div class="nav-container">
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="purchased.html">Purchased</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <section class="hero">
      <div class="hero-content">
        <h1>Level Up Your <span class="highlight">Savings Game</span></h1>
        <p>Track the games you want, save at your own pace, and never miss a release again.</p>
        <a href="dashboard.html" class="btn-primary">Start Saving 🎮</a>
      </div>
      <div class="hero-image">
        <div class="hero-card">
          <p class="hero-card-label">Next Purchase</p>
          <h2 class="hero-card-game">Elden Ring DLC</h2>
          <div class="hero-progress-bar">
            <div class="hero-progress-fill" style="width: 72%"></div>
          </div>
          <p class="hero-card-stat">₱1,440 saved of ₱2,000</p>
        </div>
      </div>
    </section>

    </main>

  <script src="js/app.js"></script>
</body>
</html>
