<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Save2Play — History Log</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" class="logo-svg">
        <defs>
          <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <filter id="magenta-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <g transform="translate(5, 5)">
          <g transform="translate(0, 2)">
            <rect x="2" y="2" width="36" height="36" rx="8" fill="#0B0E14" stroke="#00F0FF" stroke-width="1.5" filter="url(#cyan-glow)"/>
            <rect x="17" y="9" width="6" height="22" rx="1.5" fill="#151A24" stroke="rgba(0, 240, 255, 0.4)" stroke-width="1"/>
            <rect x="9" y="17" width="22" height="6" rx="1.5" fill="#151A24" stroke="rgba(0, 240, 255, 0.4)" stroke-width="1"/>
            <circle cx="20" cy="20" r="2.5" fill="#00F0FF"/>
            <circle cx="29" cy="13" r="2" fill="#FF007F" filter="url(#magenta-glow)"/>
            <circle cx="29" cy="27" r="2" fill="#FF007F" filter="url(#magenta-glow)"/>
          </g>
          <text x="52" y="28" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#00F0FF" letter-spacing="1" filter="url(#cyan-glow)">SAVE</text>
          <rect x="111" y="10" width="16" height="22" rx="4" fill="#151A24" stroke="#FF007F" stroke-width="1.5" filter="url(#magenta-glow)"/>
          <text x="115" y="27" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="900" fill="#ffffff">2</text>
          <text x="135" y="28" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#FF007F" letter-spacing="1" filter="url(#magenta-glow)">PLAY</text>
        </g>
      </svg>
    </div>

    <div class="nav-container">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="history.html" class="active">History</a></li>
        <li><a href="purchased.html">Purchased</a></li>
      </ul>
    </div>
  </nav>

  <main class="history-page">  
    <div class="page-header">    
      <div>      
        <h1>Transaction History</h1>      
        <p class="page-subtitle">Every savings deposit you've made — all in one place.</p>    
      </div>    
      <button class="btn-danger" onclick="clearHistory()">🗑️ Clear History</button>  
    </div>  

    <div class="history-filters">    
      <input      
        type="text"      
        id="search-input"      
        placeholder="🔍 Search by game title..."      
        oninput="filterHistory()"    
      />    
      <select id="sort-select" onchange="filterHistory()">      
        <option value="newest">Newest First</option>      
        <option value="oldest">Oldest First</option>      
        <option value="highest">Highest Amount</option>      
        <option value="lowest">Lowest Amount</option>    
      </select>  
    </div>  

    <div class="history-summary">    
      <div class="summary-box">      
        <p class="stat-label">Total Deposits</p>      
        <p class="stat-value" id="total-deposits">0</p>    
      </div>    
      <div class="summary-box">      
        <p class="stat-label">Total Saved</p>      
        <p class="stat-value" id="total-amount">₱0</p>    
      </div>    
      <div class="summary-box">      
        <p class="stat-label">Games Tracked</p>      
        <p class="stat-value" id="unique-games">0</p>    
      </div>  
    </div>  

    <div class="history-list" id="history-list">    
      <div class="empty-state" id="history-empty">      
        <p class="empty-icon">📋</p>      
        <h3>No transactions yet!</h3>      
        <p>Head to the <a href="dashboard.html">Dashboard</a> and start saving.</p>    
      </div>  
    </div>
  </main>

  <footer>
    <p>© 2026 Save2Play — Built by Clark Angel De Leon 🎮</p>
  </footer>

  <script src="js/history.js"></script>
</body>
</html>
